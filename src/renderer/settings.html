<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MiniChat - 设置</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    body { -webkit-app-region: no-drag; }

    .settings-container {
      padding: 24px;
      height: 100vh;
      overflow-y: auto;
    }

    .settings-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .back-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    h2 { font-size: 18px; font-weight: 600; }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #999;
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    select:focus, input:focus {
      border-color: #667eea;
    }

    .provider-section {
      display: none;
      padding: 16px;
      background: #111122;
      border-radius: 8px;
      margin-top: 12px;
    }

    .provider-section.active { display: block; }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
    }

    .save-btn:hover { opacity: 0.9; }

    .preview-btn {
      padding: 10px 16px;
      background: rgba(102, 126, 234, 0.2);
      border: 1px solid rgba(102, 126, 234, 0.5);
      border-radius: 8px;
      color: #667eea;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .preview-btn:hover { background: rgba(102, 126, 234, 0.4); }
    .preview-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="settings-container">
    <div class="settings-header">
      <button class="back-btn" id="backBtn">&larr;</button>
      <h2>设置</h2>
    </div>

    <div class="form-group">
      <label>语音</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="voiceSelect" style="flex:1;"></select>
        <button class="preview-btn" id="previewBtn">试听</button>
      </div>
    </div>

    <div class="form-group">
      <label>唤醒词（AI 回答时喊出可打断）</label>
      <input type="text" id="wakeWordInput" placeholder="小助手">
    </div>

    <div class="form-group">
      <label>AI 后端</label>
      <select id="providerSelect">
        <option value="ollama">Ollama (本地)</option>
        <option value="openai">OpenAI</option>
        <option value="claude">Claude</option>
      </select>
    </div>

    <div class="provider-section" id="ollamaSection">
      <div class="form-group">
        <label>服务地址</label>
        <input type="text" id="ollamaUrl" placeholder="http://localhost:11434">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="ollamaModel" placeholder="qwen2.5">
      </div>
    </div>

    <div class="provider-section" id="openaiSection">
      <div class="form-group">
        <label>API Base URL</label>
        <input type="text" id="openaiUrl" placeholder="https://api.openai.com">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="openaiKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="openaiModel" placeholder="gpt-4o">
      </div>
    </div>

    <div class="provider-section" id="claudeSection">
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="claudeKey" placeholder="sk-ant-...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="claudeModel" placeholder="claude-sonnet-4-20250514">
      </div>
    </div>

    <button class="save-btn" id="saveBtn">保存</button>
  </div>

  <div class="toast" id="toast">已保存</div>

  <script type="module" src="./settings.js"></script>
</body>
</html>
